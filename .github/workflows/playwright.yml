name: Playwright Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '30 10 * * *'   # 4 PM IST

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright
      run: npx playwright install --with-deps

    - name: Run Tests
      run: npx playwright test